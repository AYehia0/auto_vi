[display]
monitor = 1        # 0 = all screens, 1 = laptop (1920x1080), 2 = external (2560x1440)
width   = 1920
height  = 1080

[logging]
level           = "INFO"
screenshots_dir = "screenshots"

[automation]
double_click_interval = 0.1
typing_interval       = 0.02
action_delay          = 0.5

[retry]
max_attempts    = 3
delay_seconds   = 1.0
window_timeout  = 10.0

[workflow]
api_url      = "https://jsonplaceholder.typicode.com/posts"
post_count   = 10
output_dir   = "Desktop/"
target_icon  = "Notepad"
window_title = "Notepad"
filename_fmt = "post_{id}.txt"

[grounding]
strategies = ["ocr"]

[grounding.ocr]
languages      = ["en"]
confidence_min = 0.3
icon_offset_y  = 30
