# ── Display ──────────────────────────────────────────
[display]
width  = 1920
height = 1080

# ── Logging ─────────────────────────────────────────
[logging]
level           = "INFO"                    # DEBUG | INFO | WARNING | ERROR
screenshots_dir = "screenshots"             # save annotated screenshots here

# ── Automation timings ──────────────────────────────
[automation]
double_click_interval = 0.1                 # seconds between clicks
typing_interval       = 0.02                # seconds between keystrokes
action_delay          = 0.5                 # pause after each action

# ── Retry / robustness ─────────────────────────────
[retry]
max_attempts    = 3
delay_seconds   = 1.0
window_timeout  = 10.0                      # seconds to wait for window

# ── Notepad workflow ────────────────────────────────
[workflow]
api_url         = "https://jsonplaceholder.typicode.com/posts"
post_count      = 10
output_dir      = "Desktop/"
target_icon     = "Notepad"
window_title    = "Notepad"
filename_fmt    = "post_{id}.txt"

# ── Grounding strategies (tried in order, if one failed continue) ───────────
# Options: "ocr"
[grounding]
strategies = ["ocr"]
